# Local Postgres for Flowly development (C04+)
# Start: docker compose up -d
# Stop:  docker compose down

services:
  postgres:
    image: postgres:17-alpine
    container_name: flowy-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: flowy
      POSTGRES_PASSWORD: flowy
      POSTGRES_DB: flowy
    volumes:
      - flowy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowy -d flowy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flowy_pg_data:
